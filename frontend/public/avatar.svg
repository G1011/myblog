<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </radialGradient>
    <radialGradient id="face" cx="38%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#ffe9d2"/>
      <stop offset="100%" stop-color="#f3c08e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Subtle grid lines (tech aesthetic) -->
  <g opacity="0.07" stroke="#5599ff" stroke-width="0.8">
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
  </g>

  <!-- Floating dots (AI / data vibe) -->
  <circle cx="25"  cy="35"  r="2.2" fill="#60a5fa" opacity="0.6"/>
  <circle cx="168" cy="42"  r="1.6" fill="#34d399" opacity="0.55"/>
  <circle cx="18"  cy="168" r="1.8" fill="#f472b6" opacity="0.5"/>
  <circle cx="175" cy="160" r="2"   fill="#60a5fa" opacity="0.5"/>
  <circle cx="155" cy="22"  r="1.4" fill="#34d399" opacity="0.45"/>
  <circle cx="38"  cy="175" r="1.6" fill="#f472b6" opacity="0.4"/>

  <!-- Shirt and collar -->
  <path d="M10 200 Q38 152 76 143 Q89 155 100 155 Q111 155 124 143 Q162 152 190 200Z" fill="#1d4ed8"/>
  <path d="M76 143 L100 170 L124 143" fill="#1e3a8a"/>

  <!-- Neck -->
  <rect x="85" y="137" width="30" height="20" rx="10" fill="#f3c08e"/>

  <!-- Head -->
  <ellipse cx="100" cy="99" rx="50" ry="53" fill="url(#face)"/>

  <!-- Hair top and sides -->
  <path d="M52 90 C55 52 74 44 100 43 C126 44 145 52 148 90 C144 65 128 55 100 55 C72 55 56 65 52 90Z" fill="#14080a"/>
  <path d="M53 75 Q55 43 100 41 Q145 43 147 75 Q144 56 100 54 Q56 56 53 75Z" fill="#14080a"/>
  <ellipse cx="52"  cy="98" rx="7" ry="17" fill="#14080a"/>
  <ellipse cx="148" cy="98" rx="7" ry="17" fill="#14080a"/>

  <!-- Ears -->
  <ellipse cx="52"  cy="101" rx="7.5" ry="9.5" fill="#f3c08e"/>
  <ellipse cx="148" cy="101" rx="7.5" ry="9.5" fill="#f3c08e"/>
  <ellipse cx="52"  cy="101" rx="4.5" ry="6"   fill="#e0a070"/>
  <ellipse cx="148" cy="101" rx="4.5" ry="6"   fill="#e0a070"/>

  <!-- Eyebrows -->
  <path d="M72 87 Q82 83 91 85"    stroke="#14080a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M109 85 Q118 83 128 87" stroke="#14080a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eye whites -->
  <ellipse cx="83"  cy="100" rx="11" ry="11.5" fill="white"/>
  <ellipse cx="117" cy="100" rx="11" ry="11.5" fill="white"/>

  <!-- Iris -->
  <circle cx="84"  cy="101" r="7.5" fill="#2c1509"/>
  <circle cx="118" cy="101" r="7.5" fill="#2c1509"/>

  <!-- Pupils -->
  <circle cx="84.5"  cy="101" r="4.5" fill="#080808"/>
  <circle cx="118.5" cy="101" r="4.5" fill="#080808"/>

  <!-- Eye highlights -->
  <circle cx="87"  cy="98" r="2"    fill="white" opacity="0.95"/>
  <circle cx="121" cy="98" r="2"    fill="white" opacity="0.95"/>
  <circle cx="83"  cy="104" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="117" cy="104" r="0.8" fill="white" opacity="0.4"/>

  <!-- Glasses frames -->
  <rect x="68.5"  y="91" width="27" height="19" rx="7.5" fill="none" stroke="#2a2a2a" stroke-width="2.2"/>
  <rect x="104.5" y="91" width="27" height="19" rx="7.5" fill="none" stroke="#2a2a2a" stroke-width="2.2"/>
  <!-- Glass tint -->
  <rect x="68.5"  y="91" width="27" height="19" rx="7.5" fill="#6ea8fe" opacity="0.07"/>
  <rect x="104.5" y="91" width="27" height="19" rx="7.5" fill="#6ea8fe" opacity="0.07"/>
  <!-- Bridge and arms -->
  <line x1="95.5"  y1="100.5" x2="104.5" y2="100.5" stroke="#2a2a2a" stroke-width="2.2"/>
  <line x1="52"    y1="100.5" x2="68.5"  y2="100.5" stroke="#2a2a2a" stroke-width="2.2"/>
  <line x1="131.5" y1="100.5" x2="148"   y2="100.5" stroke="#2a2a2a" stroke-width="2.2"/>

  <!-- Nose -->
  <path d="M96 115 Q100 121 104 115" fill="none" stroke="#c88050" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M87 128 Q100 139 113 128" fill="none" stroke="#b06040" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="70"  cy="116" rx="10" ry="5.5" fill="#ff9977" opacity="0.28"/>
  <ellipse cx="130" cy="116" rx="10" ry="5.5" fill="#ff9977" opacity="0.28"/>
</svg>
